name: Node.js CI Pipeline 

on: 
  push:
    branches: [ "main" ]
  pull_request: 
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. get the code from Github (Checkout)
      uses: actions/chechout@v3

    - name: 2. Set up Node.js environment
      uses: actions/setup-node@v3
      with: 
	node-version: '18'

    - name: 3. Install dependencies
      run: npm install

    - name: Run build
      run: echo "Building the application... Success!"
