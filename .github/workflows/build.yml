name: Node.js CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Get the code from GitHub (Checkout)
      uses: actions/checkout@v3

    - name: 2. Set up Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 3. Install dependencies
      run: npm install

    - name: 4. Run Build
      run: echo "Building the application... Success!"
